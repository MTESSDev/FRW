          description: 'Paramètre manquant, invalide ou erreur interne du serveur'
  /api/v1/Document/Telecharger:
    get:
      tags:
        - Document
      summary: FRW121 - Télécharger une pièce jointe
      parameters:
        - name: nomFichierOriginal
          in: query
          description: Nom original du fichier
          schema:
            type: string
        - name: nomFichierInterne
          in: query
          description: Nom interne du fichier
          schema:
            type: string
        - name: checksum
          in: query
          description: Checksum du nom interne du fichier
          schema:
            type: string
        - name: Accept-Language
          in: header
          description: Spécifie la langue préférée pour les réponses (en-CA ou fr-CA)
          schema:
            enum:
              - en-CA
              - fr-CA
            type: string
      responses:
        '200':
          description: Succès
        '400':
          description: Paramètre manquant ou invalide
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Accès non autorisé
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: 'Paramètre manquant, invalide ou erreur interne du serveur'
