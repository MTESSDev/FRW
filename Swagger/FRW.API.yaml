components:
  schemas:
    Adresse:
      type: object
      properties:
        rue:
          type: string
          nullable: true
        municipalite:
          type: string
          nullable: true
        municipaliteNomLong:
          type: string
          nullable: true
        codePostal:
          type: string
          nullable: true
      additionalProperties: false
    EntrantCreerFormulaireRepriseDifferee:
      required:
        - dateFin
        - motDePasse
      type: object
      properties:
        jsonData:
          description: Contenu du formulaire
          nullable: true
        motDePasse:
          minLength: 1
          type: string
          description: Mot de passe de la reprise
        dateFin:
          type: string
          description: Date d'expiration de la session
          format: date-time
      additionalProperties: false
      description: Paramètres de FRW117 - Créer un formulaire pour reprise en différée
    EntrantDeconnexion:
      type: object
      properties:
        expiration:
          type: integer
          format: int64
      additionalProperties: false
    EntrantDeployerSysteme:
      type: object
      properties:
        zip:
          type: string
          format: byte
          nullable: true
      additionalProperties: false
    EntrantRechercherFormulairesSIS:
      type: object
      properties:
        etatsFormulaireRecherche:
          type: array
          items:
            type: string
          nullable: true
        codeTypeFormulaire:
          type: string
          nullable: true
        noConfirmation:
          type: integer
          format: int32
          nullable: true
        noPublicFormulaire:
          type: string
          nullable: true
      additionalProperties: false
    EntrantSignerPR:
      type: object
      properties:
        nomComplet:
          type: string
          nullable: true
        courriel:
          type: string
          nullable: true
        initiales:
          type: string
          nullable: true
        nbCaracteresInitiales:
          type: integer
          format: int32
          nullable: true
        idChamp:
          type: string
          nullable: true
      additionalProperties: false
    EntrantValidationBancaire:
      type: object
      properties:
        succursale:
          type: string
          nullable: true
        institutionFinanciere:
          type: string
          nullable: true
        compte:
          type: string
          nullable: true
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: {}
    Recherche:
      type: object
      properties:
        c:
          type: string
          nullable: true
        t:
          type: string
          nullable: true
        r:
          type: string
          nullable: true
        h:
          type: string
          nullable: true
      additionalProperties: false
    RetourCreerFormulaireRepriseDifferee:
      type: object
      properties:
        noPublicForm:
          type: string
          description: Numéro publique de formulaire
          nullable: true
        noPublicSession:
          type: string
          description: Numéro publique de session
          nullable: true
        noTransactionChiffre:
          type: string
          description: Numéro de reprise de formulaire
          nullable: true
      additionalProperties: false
      description: Retour de FRW117 - Créer un formulaire pour reprise en différée
    RetourCreerReprendreFormulaireIndividu:
      type: object
      properties:
        noPublicSession:
          type: string
          nullable: true
        noPublicForm:
          type: string
          nullable: true
        noTransactionChiffre:
          type: string
          nullable: true
      additionalProperties: false
    RetourRechercherFormulaires:
      type: object
      properties:
        typeFormulaire:
          type: string
          nullable: true
        noPublicForm:
          type: string
          nullable: true
        identifiantUtilisateur:
          type: string
          nullable: true
        titreFrancais:
          type: string
          nullable: true
        titreAnglais:
          type: string
          nullable: true
        dateCreation:
          type: string
          format: date-time
        dernierEtat:
          type: string
          nullable: true
        dateDernierEtat:
          type: string
          format: date-time
        dateEpuration:
          type: string
          format: date-time
        numeroConfirmation:
          type: integer
          format: int32
          nullable: true
        informationsSupplementaires:
          type: object
          additionalProperties:
            type: string
          nullable: true
      additionalProperties: false
  securitySchemes:
    ApiKey:
      type: apiKey
      description: Clée API secrète du système autorisé
      name: X-ApiKey
      in: header
    NoPublicSystemeAutorise:
      type: apiKey
      description: Numéro public du système autorisé
      name: X-NoPublicSystemeAutorise
      in: header
