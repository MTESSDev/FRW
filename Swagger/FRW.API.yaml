openapi: 3.0.4
info:
  title: FRW - API
  description: Définition de l'API publique pour intéragir avec FRW.
  contact:
    name: MESS - SFPS
  version: v1
paths:
  '/api/v1/Conavigation/Creer/{shortInstance}':
    post:
      tags:
        - Conavigation
      summary: FRW241 - Générer un code de co-navigation
      parameters:
        - name: shortInstance
          in: path
          required: true
          schema:
            type: string
        - name: Accept-Language
          in: header
          description: Spécifie la langue préférée pour les réponses (en-CA ou fr-CA)
          schema:
            enum:
              - en-CA
              - fr-CA
            type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
  '/api/v1/Document/Telecharger/{nomFichierProtege}':
    get:
      tags:
        - Document
      summary: FRW121 - Télécharger une pièce par nom de fichier protégé
      description: Permet de récupérer une pièce jointe transmise par un citoyen
      parameters:
        - name: nomFichierProtege
          in: path
          description: Nom fichier protégé (provient du contenu du formulaire)
          required: true
          schema:
            type: string
        - name: bypassSecurite
          in: query
          description: Permet de ne pas valider la sécurité.
          schema:
            type: boolean
            default: false
        - name: X-NoPublicSystemeAutorise
          in: header
          description: Guid publique de système autorisé
          schema:
            type: string
        - name: X-ApiKey
          in: header
          description: Clée API
          schema:
            type: string
        - name: Accept-Language
          in: header
          description: Spécifie la langue préférée pour les réponses (en-CA ou fr-CA)
          schema:
            enum:
              - en-CA
              - fr-CA
            type: string
      responses:
        '200':
          description: Succès
        '400':
          description: Paramètre manquant ou invalide
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Accès non autorisé
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Fichier demandé introuvable
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: 'Paramètre manquant, invalide ou erreur interne du serveur'
      security:
        - {}
        - {}
  '/api/v1/Document/Telecharger/{sessionUtilisateur}/{nomFichierProtege}':
    get:
      tags:
        - Document
      summary: FRW121 - Télécharger une pièce avec session active
      parameters:
        - name: sessionUtilisateur
          in: path
          description: Session utilisateur (shortGuid) (provient de la barre adresse)
          required: true
          schema:
            type: string
        - name: nomFichierProtege
          in: path
          description: Nom fichier protégé (provient du contenu du formulaire)
          required: true
          schema:
            type: string
        - name: bypassSecurite
          in: query
          description: Permet de ne pas valider la sécurité.
          schema:
            type: boolean
        - name: onglet
          in: query
          description: ''
          schema:
            type: boolean
        - name: Accept-Language
          in: header
          description: Spécifie la langue préférée pour les réponses (en-CA ou fr-CA)
          schema:
            enum:
              - en-CA
              - fr-CA
            type: string
      responses:
        '200':
          description: Succès
        '400':
          description: Paramètre manquant ou invalide
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Accès non autorisé
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: 'Paramètre manquant, invalide ou erreur interne du serveur'
  '/api/v1/Document/Upload/{shortInstance}':
