  '/api/v1/SIS/CreerFormulaireIndividu/{typeFormulaire}':
    post:
      tags:
        - SIS
      summary: FRW111 - Créer un formulaire Web pour un individu.
      description: >-
        Permet de créer un formulaire pour un individu connu par le système
        autorisé.
      parameters:
        - name: typeFormulaire
          in: path
          description: '_Exemple:_ `3003`'
          required: true
          schema:
            type: string
        - name: X-ApiKey
          in: header
          description: Clé Api
          schema:
            type: string
        - name: X-NoPublicSystemeAutorise
          in: header
          description: Numéro public du système autorisé
          schema:
            type: string
        - name: X-NoPublicSystemeAutoriseDeleguant
          in: header
          description: >-
            Numéro public du système autorisé qui a délégué le contrôle sur son
            formulaire
          schema:
            type: string
        - name: X-IdentifiantUtilisateur
          in: header
          description: Identifiant de l'utilisateur
          schema:
            type: string
        - name: Accept-Language
          in: header
          description: Spécifie la langue préférée pour les réponses (en-CA ou fr-CA)
          schema:
            enum:
              - en-CA
              - fr-CA
            type: string
      requestBody:
        description: >-
          Le contenu du formulaire (pour pré-remplissage) ex: `{"form":
          {"champ1": "val1"} }`
        content:
          application/json:
            schema: {}
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetourCreerReprendreFormulaireIndividu'
        '400':
          description: Paramètre manquant ou invalide
          content:
            application/json:
              schema:
